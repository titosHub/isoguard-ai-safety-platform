sector_id: manufacturing
name: Manufacturing
version: '1'
feature_toggles:
  reporting: true
  government_submissions: true
  rules_engine: true
ai_models:
  - id: yolo-machine-safety
    name: Machine Safety (YOLO)
    kind: yolo
    enabled: true
    artifact: models/manufacturing/machine_safety.pt
cameras: []
zones: []
rules:
  - id: manufacturing-loto
    name: LOTO compliance
    description: Lockout/Tagout violations must be tagged for compliance.
    detection_types: ["unsafe_behavior"]
    severity: high
    regulatory_tags: ["OSHA", "ISO45001"]
report_templates:
  - id: template-daily
    name: Daily Safety Report
    description: Daily summary of incidents, near-misses, and KPI coverage.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-weekly
    name: Weekly LOTO & Machine Safety Report
    description: Weekly trends on LOTO adherence, guarding, and unsafe behavior detections.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-monthly
    name: Monthly Executive Report
    description: Monthly executive view for plant leadership.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-compliance
    name: OSHA / ISO 45001 Compliance Report
    description: Compliance documentation for audits and regulators.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-corrective-actions
    name: Corrective Actions & Near-Miss Review
    description: Review of corrective actions, closure rates, and near-miss learnings.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-government
    name: Government Submission Bundle
    description: Standardized export bundle for regulators.
    formats: ["pdf", "csv", "json", "xlsx"]
