sector_id: health
name: Healthcare
version: '1'
feature_toggles:
  reporting: true
  government_submissions: true
  rules_engine: true
ai_models:
  - id: yolo-clinical-safety
    name: Clinical Safety (YOLO)
    kind: yolo
    enabled: true
    artifact: models/health/clinical_safety.pt
cameras: []
zones: []
rules:
  - id: health-hand-hygiene
    name: Hand hygiene compliance
    description: Tag hygiene-related unsafe behavior for compliance.
    detection_types: ["unsafe_behavior"]
    severity: medium
    regulatory_tags: ["ISO45001", "HEALTH_SAFETY"]
report_templates:
  - id: template-daily
    name: Daily Safety Report
    description: Daily summary of incidents and KPIs for clinical operations.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-weekly
    name: Weekly Hygiene & Safety Report
    description: Weekly trends for hygiene compliance and safety-related incidents.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-monthly
    name: Monthly Executive Quality & Safety
    description: Monthly executive report for leadership and quality governance.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-compliance
    name: Clinical Safety Compliance Report
    description: Audit documentation for safety programs, training, and incident registers.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-flow-correlation
    name: Patient Flow & Incident Correlation
    description: Correlate patient flow/throughput with incident patterns (operational insights).
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-government
    name: Government Submission Bundle
    description: Standardized export bundle for health regulators.
    formats: ["pdf", "csv", "json", "xlsx"]
