sector_id: border
name: Border Control
version: '1'
feature_toggles:
  reporting: true
  government_submissions: true
  rules_engine: true
ai_models:
  - id: yolo-perimeter
    name: Perimeter Security (YOLO)
    kind: yolo
    enabled: true
    artifact: models/border/perimeter.pt
cameras: []
zones: []
rules:
  - id: border-perimeter-breach
    name: Perimeter breach
    description: Any breach of the perimeter fence triggers a critical regulatory event.
    detection_types: ["perimeter_breach"]
    severity: critical
    regulatory_tags: ["BORDER_SECURITY"]
report_templates:
  - id: template-daily
    name: Daily Operations Report
    description: Daily summary of border incidents, detections, and KPIs.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-weekly
    name: Weekly Border Activity Report
    description: Weekly trends for detections, staffing, and operational performance.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-monthly
    name: Monthly Command Review
    description: Executive-level monthly summary for leadership and oversight.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-compliance
    name: Compliance & Incident Register
    description: Auditable register of incidents, escalations, and response timelines.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-perimeter-breach-pack
    name: Perimeter Breach Incident Pack
    description: Forensics-ready pack of perimeter breach events and evidence references.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-government
    name: Government Submission Bundle
    description: Standardized export bundle for relevant authorities.
    formats: ["pdf", "csv", "json", "xlsx"]
