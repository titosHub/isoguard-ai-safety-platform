sector_id: warehouse
name: Warehousing
version: '1'
feature_toggles:
  reporting: true
  government_submissions: true
  rules_engine: true
ai_models:
  - id: yolo-forklift
    name: Forklift Proximity (YOLO)
    kind: yolo
    enabled: true
    artifact: models/warehouse/forklift.pt
cameras: []
zones: []
rules:
  - id: warehouse-forklift-proximity
    name: Forklift proximity
    description: Tag and escalate forklift proximity violations.
    detection_types: ["proximity_vehicle"]
    severity: high
    regulatory_tags: ["OSHA", "ISO45001"]
report_templates:
  - id: template-daily
    name: Daily Safety Report
    description: Daily summary of incidents, forklift interactions, and KPIs.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-weekly
    name: Weekly Forklift & Proximity Report
    description: Weekly trends for forklift proximity, speed, and pedestrian interactions.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-monthly
    name: Monthly Executive Report
    description: Monthly executive overview for distribution leadership.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-compliance
    name: OSHA / ISO 45001 Compliance Report
    description: Audit documentation for safety compliance and training records.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-traffic-heatmap
    name: Traffic & Congestion Heatmap Report
    description: Hotspot analysis for vehicle/pedestrian traffic and near-misses.
    formats: ["pdf", "csv", "json", "xlsx"]
  - id: template-government
    name: Government Submission Bundle
    description: Standardized export bundle for regulators.
    formats: ["pdf", "csv", "json", "xlsx"]
